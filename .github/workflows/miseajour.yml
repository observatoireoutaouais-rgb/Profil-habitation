name: Mise à jour des données

# Optional: future-proof Node version warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  # Manual run from GitHub Actions
  workflow_dispatch:

  # Run automatically when these files change
  push:
    branches: [ main ]
    paths:
      - 'pipeline.py'
      - 'MATCH.csv'
      - '.github/workflows/miseajour.yml'

  # Weekly automatic run (Monday at 6:00 UTC)
  schedule:
    - cron: '0 6 * * 1'

# Allow the workflow to push changes back to the repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Run pipeline
        run: python pipeline.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/data
          git commit -m "Update generated data" || echo "No changes to commit"
          git push
