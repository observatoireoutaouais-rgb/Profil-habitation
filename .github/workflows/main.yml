name: Mise à jour des données

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'pipeline.py'
      - 'MATCH.csv'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer dépendances
        run: pip install requests pandas numpy

      - name: Lancer le pipeline
        run: python pipeline.py

      - name: Committer les données mises à jour
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add web/data/
          git diff --staged --quiet || git commit -m "🔄 Mise à jour automatique des données $(date '+%Y-%m-%d')"
          git push
