name: Mise à jour des données

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'pipeline.py'
      - 'MATCH.csv'
      - 'pf-mun-2023-2023.csv'
      - '.github/workflows/main.yml'
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests

      - name: Télécharger les SHP historiques (MAMH, 2012–2022)
        run: |
          BASE_URL="https://donneesouvertes.affmunqc.net/role"
          for ANNEE in 2012 2013 2014 2015 2016 2017 2018 2019 2020 2021 2022; do
            ZIP="ROLE${ANNEE}_SHP.zip"
            echo "Téléchargement de $ZIP…"
            curl -fsSL --retry 3 --retry-delay 5 \
              -H "User-Agent: Mozilla/5.0" \
              -o "$ZIP" \
              "${BASE_URL}/${ZIP}" \
            && echo "  ✓ $ZIP ($(du -sh $ZIP | cut -f1))" \
            || echo "  ⚠  $ZIP non disponible, ignoré."
          done

      - name: Run pipeline
        run: python pipeline.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add web/data
          git commit -m "chore: update generated data" || echo "No changes to commit"

          git pull --rebase origin main || echo "Pull skipped"
          git push origin HEAD:main
